function parseCSVLine(line){
const result=[];let current='';let inQuotes=false;
for(let i=0;i<line.length;i++){
if(inQuotes){if(line[i]==='"'&&line[i+1]==='"'){current+='"';i++}else if(line[i]==='"'){inQuotes=false}else{current+=line[i]}}
else{if(line[i]==='"'){inQuotes=true}else if(line[i]===','){result.push(current.trim());current=''}else{current+=line[i]}}}
result.push(current.trim());return result;
}

function save(){
localStorage.setItem('audited_pipeline',JSON.stringify(AUDITED));
localStorage.setItem('contacted_pipeline',JSON.stringify(CONTACTED));
}

// Mark as audited (confirmed we can help, ready to contact)
function markAudited(id,note){
const d=DATA.find(x=>x.id===id);if(!d)return;
AUDITED[id]={name:d.name,phone:d.phone,email:d.email,address:d.address,website:d.website,status:d.status,category:d.category,auditedDate:new Date().toISOString(),note:note||''};
save();updateStats();render();renderAudited();
}

function unmarkAudited(id){
delete AUDITED[id];
save();updateStats();render();renderAudited();
}

// Move from audited to contacted
function markContacted(id){
const a=AUDITED[id];
if(!a){const d=DATA.find(x=>x.id===id);if(!d)return;
CONTACTED[id]={name:d.name,phone:d.phone,email:d.email,address:d.address,website:d.website,status:d.status,category:d.category,auditedDate:null,contactedDate:new Date().toISOString(),note:'',followUps:[]};
}else{
CONTACTED[id]={...a,contactedDate:new Date().toISOString(),followUps:[]};
delete AUDITED[id];
}
save();updateStats();render();renderAudited();renderPipeline();
}

function unmarkContacted(id){
// Move back to audited if it was audited before
const c=CONTACTED[id];if(!c)return;
if(c.auditedDate){
AUDITED[id]={name:c.name,phone:c.phone,email:c.email,address:c.address,website:c.website,status:c.status,category:c.category,auditedDate:c.auditedDate,note:c.note};
}
delete CONTACTED[id];
save();updateStats();render();renderAudited();renderPipeline();
}

function addFollowUp(id){
if(!CONTACTED[id])return;
CONTACTED[id].followUps.push({date:new Date().toISOString(),note:''});
CONTACTED[id].lastFollowUp=new Date().toISOString();
save();renderPipeline();
}

function updateAuditNote(id,note){if(AUDITED[id]){AUDITED[id].note=note;save();}}
function updateContactNote(id,note){if(CONTACTED[id]){CONTACTED[id].note=note;save();}}

function daysAgo(dateStr){
const d=new Date(dateStr);const now=new Date();
return Math.floor((now-d)/(1000*60*60*24));
}

function daysLabel(days){
if(days===0)return'Today';if(days===1)return'Yesterday';
if(days<=7)return`${days} days ago`;if(days<=14)return'1-2 weeks ago';
if(days<=30)return'2-4 weeks ago';return'Over a month ago';
}

function statusPriority(s){
if(s==='No Website')return 0;if(s==='Broken/Down')return 1;if(s==='Old/Outdated')return 2;
if(s==='SSL Error')return 3;if(s==='Aging')return 4;if(s==='Likely Outdated')return 5;
if(s==='Modern')return 6;return 5;
}

function badgeClass(s){
if(s==='No Website')return'hot';if(s==='Broken/Down')return'broken';if(s==='Old/Outdated')return'outdated';
if(s==='SSL Error')return'ssl';if(s==='Aging')return'aging';if(s==='Modern')return'modern';return'aging';
}

function updateStats(){
const auditedIds=new Set(Object.keys(AUDITED).map(Number));
const contactedIds=new Set(Object.keys(CONTACTED).map(Number));
const taken=new Set([...auditedIds,...contactedIds]);
document.getElementById('s-total').textContent=DATA.length;
document.getElementById('s-hot').textContent=DATA.filter(d=>d.status==='No Website'&&!taken.has(d.id)).length;
document.getElementById('s-outdated').textContent=DATA.filter(d=>['Broken/Down','Old/Outdated','SSL Error','Aging','Likely Outdated','Error: ReadTimeout'].includes(d.status)&&!taken.has(d.id)).length;
document.getElementById('s-modern').textContent=DATA.filter(d=>d.status==='Modern'&&!taken.has(d.id)).length;
document.getElementById('s-audited').textContent=Object.keys(AUDITED).length;
document.getElementById('s-contacted').textContent=Object.keys(CONTACTED).length;
}

function render(){
const q=document.getElementById('search').value.toLowerCase();
const taken=new Set([...Object.keys(AUDITED).map(Number),...Object.keys(CONTACTED).map(Number)]);
let filtered=DATA.filter(d=>!taken.has(d.id)).filter(d=>{
if(currentFilter==='all')return true;
if(currentFilter==='No Website')return d.status==='No Website';
if(currentFilter==='outdated')return['Broken/Down','Old/Outdated','SSL Error','Aging','Likely Outdated','Error: ReadTimeout'].includes(d.status);
if(currentFilter==='Modern')return d.status==='Modern';
return true;
}).filter(d=>!q||(d.name+d.category+d.address+d.phone).toLowerCase().includes(q));

filtered.sort((a,b)=>{
if(currentSort==='status')return(statusPriority(a.status)-statusPriority(b.status))*sortDir;
return(a[currentSort]||'').localeCompare(b[currentSort]||'')*sortDir;
});

document.getElementById('tbody').innerHTML=filtered.map(d=>{
const webLink=d.website?`<a href="${d.website}" target="_blank">${new URL(d.website).hostname.replace('www.','')}</a>`:'—';
return`<tr>
<td><strong>${d.name}</strong>${d.email?`<br><span class="town">${d.email}</span>`:''}</td>
<td>${d.category}</td>
<td>${d.address}</td>
<td>${d.phone?`<a href="tel:${d.phone}">${d.phone}</a>`:'—'}</td>
<td>${webLink}</td>
<td><span class="badge ${badgeClass(d.status)}">${d.status}</span></td>
<td><div class="btn-group"><button class="btn btn-audit" onclick="markAudited(${d.id})">🔍 Audited</button><button class="btn btn-contact" onclick="markContacted(${d.id})">📞 Contacted</button></div></td>
</tr>`;}).join('');
}

function renderAudited(){
const q=(document.getElementById('search-audited')?.value||'').toLowerCase();
let entries=Object.entries(AUDITED).map(([id,a])=>({id:Number(id),...a,days:daysAgo(a.auditedDate)}));
if(q)entries=entries.filter(e=>(e.name+e.address+e.note).toLowerCase().includes(q));
entries.sort((a,b)=>a.days-b.days);

if(!entries.length){
document.getElementById('audited-list').innerHTML='<p class="empty-state">No audited businesses yet. Click "🔍 Audited" on a prospect to confirm you can help them.</p>';
return;
}

let html=`<table><thead><tr>
<th>Business</th><th>Phone</th><th>Website</th><th>Original Status</th><th>Audited</th><th>Note</th><th>Actions</th>
</tr></thead><tbody>`;
entries.forEach(e=>{
const webLink=e.website?`<a href="${e.website}" target="_blank">${new URL(e.website).hostname.replace('www.','')}</a>`:'—';
html+=`<tr>
<td><strong>${e.name}</strong>${e.email?`<br><span class="town">${e.email}</span>`:''}<br><span class="town">${e.address}</span></td>
<td>${e.phone?`<a href="tel:${e.phone}">${e.phone}</a>`:'—'}</td>
<td>${webLink}</td>
<td><span class="badge ${badgeClass(e.status)}">${e.status}</span></td>
<td><span class="badge audit">${daysLabel(e.days)}</span></td>
<td><input class="note-input" value="${(e.note||'').replace(/"/g,'&quot;')}" onchange="updateAuditNote(${e.id},this.value)" placeholder="Add note..."></td>
<td><div class="btn-group"><button class="btn btn-contact" onclick="markContacted(${e.id})">📞 Contact</button><button class="btn btn-undo" onclick="unmarkAudited(${e.id})">↩ Undo</button></div></td>
</tr>`;
});
html+=`</tbody></table>`;
document.getElementById('audited-list').innerHTML=html;
}

function renderPipeline(){
const q=(document.getElementById('search-contacted')?.value||'').toLowerCase();
let entries=Object.entries(CONTACTED).map(([id,c])=>({id:Number(id),...c,days:daysAgo(c.contactedDate)}));
if(q)entries=entries.filter(e=>(e.name+e.address+e.note).toLowerCase().includes(q));
entries.sort((a,b)=>b.days-a.days);

if(!entries.length){
document.getElementById('pipeline').innerHTML='<p class="empty-state">No contacted businesses yet. Audit prospects first, then move them here when you reach out.</p>';
return;
}

const groups={};
entries.forEach(e=>{
const label=daysLabel(e.days);
if(!groups[label])groups[label]=[];
groups[label].push(e);
});

const order=['Today','Yesterday','2 days ago','3 days ago','4 days ago','5 days ago','6 days ago','7 days ago','1-2 weeks ago','2-4 weeks ago','Over a month ago'];
let html='';
for(const label of order){
if(!groups[label])continue;
const items=groups[label];
const needsFollowUp=label!=='Today'&&label!=='Yesterday';
html+=`<div class="pipeline-group">
<h3 class="contact-header">${label} ${needsFollowUp?'⏰ Follow up!':''}<span>${items.length} business${items.length>1?'es':''}</span></h3>
<table><thead><tr>
<th>Business</th><th>Phone</th><th>Website</th><th>Status</th><th>Note</th><th>Follow-ups</th><th>Actions</th>
</tr></thead><tbody>`;
items.forEach(e=>{
const webLink=e.website?`<a href="${e.website}" target="_blank">${new URL(e.website).hostname.replace('www.','')}</a>`:'—';
const fuCount=e.followUps?e.followUps.length:0;
html+=`<tr>
<td><strong>${e.name}</strong>${e.email?`<br><span class="town">${e.email}</span>`:''}<br><span class="town">${e.address}</span></td>
<td>${e.phone?`<a href="tel:${e.phone}">${e.phone}</a>`:'—'}</td>
<td>${webLink}</td>
<td><span class="badge ${badgeClass(e.status)}">${e.status}</span></td>
<td><input class="note-input" value="${(e.note||'').replace(/"/g,'&quot;')}" onchange="updateContactNote(${e.id},this.value)" placeholder="Add note..."></td>
<td>${fuCount>0?`<span style="color:#a78bfa;font-weight:600">${fuCount}x</span> `:''}<button class="btn btn-contact" onclick="addFollowUp(${e.id})" style="font-size:.7rem;padding:4px 8px">+ Follow-up</button></td>
<td><button class="btn btn-undo" onclick="unmarkContacted(${e.id})">↩ Undo</button></td>
</tr>`;
});
html+=`</tbody></table></div>`;
}
document.getElementById('pipeline').innerHTML=html;
}

// Tab switching
document.querySelectorAll('.tabs button').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
if(btn.dataset.tab==='audited')renderAudited();
if(btn.dataset.tab==='contacted')renderPipeline();
});
});

document.getElementById('search').addEventListener('input',render);
document.getElementById('search-audited')?.addEventListener('input',renderAudited);
document.getElementById('search-contacted')?.addEventListener('input',renderPipeline);

document.querySelectorAll('.filters button').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
currentFilter=btn.dataset.filter;
render();
});
});

document.querySelectorAll('th[data-sort]').forEach(th=>{
th.addEventListener('click',()=>{
const s=th.dataset.sort;
if(currentSort===s)sortDir*=-1;else{currentSort=s;sortDir=1;}
render();
});
});

function exportCSV(){
const taken=new Set([...Object.keys(AUDITED).map(Number),...Object.keys(CONTACTED).map(Number)]);
let csv='Business Name,Category,Address,Phone,Email,Website,Status\n';
DATA.filter(d=>!taken.has(d.id)).forEach(d=>{
csv+=[d.name,d.category,d.address,d.phone,d.email,d.website,d.status].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')+'\n';
});
dl(csv,'car-service-prospects.csv');
}

function exportAudited(){
let csv='Business Name,Category,Address,Phone,Email,Website,Status,Audited Date,Note\n';
Object.entries(AUDITED).forEach(([id,a])=>{
csv+=[a.name,a.category,a.address,a.phone,a.email,a.website,a.status,a.auditedDate?.slice(0,10)||'',a.note].map(v=>`"${(v+'').replace(/"/g,'""')}"`).join(',')+'\n';
});
dl(csv,'audited-businesses.csv');
}

function exportContacted(){
let csv='Business Name,Category,Address,Phone,Email,Website,Status,Contacted Date,Days Ago,Note,Follow-ups\n';
Object.entries(CONTACTED).forEach(([id,c])=>{
csv+=[c.name,c.category,c.address,c.phone,c.email,c.website,c.status,c.contactedDate?.slice(0,10)||'',daysAgo(c.contactedDate),c.note,c.followUps?.length||0].map(v=>`"${(v+'').replace(/"/g,'""')}"`).join(',')+'\n';
});
dl(csv,'contacted-businesses.csv');
}

function dl(csv,name){
const blob=new Blob([csv],{type:'text/csv'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download=name;a.click();
}
